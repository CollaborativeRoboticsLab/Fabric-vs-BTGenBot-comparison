%YAML 1.1
---
name: PromptPlanRunner
spec_version: 1.1
spec_type: interface
description: "This capability requests to create a new plan at the end of an execution plan. This capability can be trigged with an xml command such as 
              '<Runner interface=prompt_capabilities/PromptPlanRunner provider=prompt_capabilities/PromptPlanRunner replan=false task=$task/>'. 
              This will prompt to create a new execution plan either to continue the current task or to focus on a new task given by $task value depending on 
              the state of the robot. This capability needs to be in every execution plan created and needs be the capability before the last in any  plan. 
              All plans need to be contained within <Plan> and </Plan> xml tags. <Control type= name=> </Control> dictates the control flow of the plan and
              has two attributes, type and name. The type attribute can be one of the following values: sequential, parallel_any, parallel_all, recovery. The 
              name attribute is optional and can be used to give a name to the control flow.

              '<?xml version='1.0' encoding='UTF-8'?>' should be the first line of the xml file and it is not a part of the plan. Additionally the attribute 
              values should be enclosed within double quotes. The plan can contain multiple control flows and capabilities. Keep the interface and provider 
              attributes of the Runner correctly matched with their namespace and wrong interface and provider values will result in the plan being rejected.
              
              <Control type=sequential name=name_of_flow> </Control> will trigger children one after the other depending on predecessor's successful completion 
              
              <Control type=parallel_any name=name_of_flow> </Control> will trigger children one after another depending on predecessor's successful start up and
              making it psudo-parallel. All children will execute until at least one capability to finishes before proceeding to execute the rest of the plan.
              
              <Control type=parallel_all name=name_of_flow> </Control> will trigger children one after another depending on predecessor's successful start up and
              making it psudo-parallel. All children will execute until all capabilities finish before proceeding to execute the rest of the plan.
              
              <Control type=recovery name=name_of_flow> </Control> will trigger children only on the immediate predecessor's failure. Capabilities within recovery 
              control flow will be executed sequentially on predecessors failure, until at least one capability finishes successfully, and then rest of the recovery
              capabilities will be skipped and the main plan will continue execution.

              Upon the completion of this capability, another capability need to be executed for verifying and starting the execution of the new plan via
               '<Runner interface=prompt_capabilities/FabricSetPlanRunner provider=prompt_capabilities/FabricSetPlanRunner/>' xml command.
              
              Following example plan shows how to navigate to a series of waypoints, specifically (5.0, 5.0), (2.0,2.0) and (3.0, 1.0) in order. And if the robot 
              cannot reach point (5.0, 5.0) it can move to (0.0, 0.0) as a recovery measure.:

              '<?xml version='1.0' encoding='UTF-8'?>
                <Plan name='navigate_or_return_fabric'>
                    <Control type='sequential' name='main_execution_plan'>
                    <Runner interface='nav2_capabilities/WaypointRunner' provider='nav2_capabilities/WaypointRunner' x='5.0' y='5.0' />
                    <Control type='recovery' name='return_to_home_if_lost'>
                        <Runner interface='nav2_capabilities/WaypointRunner' provider='nav2_capabilities/WaypointRunner' x='0.0' y='0.0' />
                    </Control>
                    <Runner interface='nav2_capabilities/WaypointRunner' provider='nav2_capabilities/WaypointRunner' x='2.0' y='2.0' />
                    <Runner interface='nav2_capabilities/WaypointRunner' provider='nav2_capabilities/WaypointRunner' x='3.0' y='1.0' />
                    </Control>
                </Plan>'"
interface:
  services:
    "/prompt":
      type: "prompt_msgs/srv/Prompt"
      description: "This capability focuses on requesting a decision making authority to create a plan for a specific task."