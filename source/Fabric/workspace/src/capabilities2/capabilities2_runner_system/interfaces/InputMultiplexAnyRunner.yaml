%YAML 1.1
---
name: InputMultiplexAnyRunner
spec_version: 1.1
spec_type: interface
description: "This capability combines the results of any (at least one) input by multiplexing events into a single interface. It allows the 
              robot to wait or multiple parallel processes at once until completion. This is inserted by the system itself and a decision  
              making authority such as an LLM does not need to include this in plans generated by it."
interface:
  actions:
    "empty":
      type: std_srvs/action/Empty
      description: empty. not used