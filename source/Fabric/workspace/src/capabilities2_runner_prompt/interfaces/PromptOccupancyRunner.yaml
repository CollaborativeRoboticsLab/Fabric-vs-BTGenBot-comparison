%YAML 1.1
---
name: PromptOccupancyRunner
spec_version: 1.1
spec_type: interface
description: "This capability allows an decision making authority such as an LLM to recieve occupancy grid data from the robot. This capability can be 
              trigged with the xml command '<Runner interface=capabilities2_runner_prompt/PromptOccupancyRunner provider=capabilities2_runner_prompt/PromptOccupancyRunner />'. 
              This will prompt the latest nav_msgs/occupancy_grid msg in xml format and would allow the decision making authority to understand the 
              position of the robot. Data for this is generated by a capability such as capabilities2_runner_prompt/OccupancyGridRunner which needs 
              to be triggered before the capabilities2_runner_prompt/PromptPoseRunner using an xml command such as 
              '<Runner interface=capabilities2_runner_prompt/OccupancyGridRunner provider=capabilities2_runner_prompt/OccupancyGridRunner/>'"
interface:
  services:
    "/prompt":
      type: "prompt_msgs/srv/Prompt"
      description: "This service focuses on prompting occupancy grid maps to decision making authority."