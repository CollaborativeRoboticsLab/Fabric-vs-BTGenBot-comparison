%YAML 1.1
---
name: PromptPoseRunner
spec_version: 1.1
spec_type: interface
description: "This capability allows an decision making authority such as an LLM to recieve robot pose and orientation data from the robot. This capability 
              can be trigged with the xml command '<Runner interface=capabilities2_runner_prompt/PromptPoseRunner provider=capabilities2_runner_prompt/PromptPoseRunner />'. This will 
              prompt the geometry_msgs/Pose msg in the xml format and would allow the decision making authority to understand the position of the robot. Data for this is generated by 
              a capability such as capabilities2_runner_nav2/RobotPoseRunner which needs to be triggered always before the capabilities2_runner_prompt/PromptPoseRunner using an xml 
              command such as '<Runner interface=capabilities2_runner_nav2/RobotPoseRunner provider=capabilities2_runner_nav2/RobotPoseRunner  map=map odom=odom robot=base_link/>'"
interface:
  services:
    "/prompt":
      type: "prompt_msgs/srv/Prompt"
      description: "This service focuses on capturing pose (position and orientation) of the robot and transfering them to decision making authority."